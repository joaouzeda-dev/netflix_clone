<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>
	<header class="site-header">
		<h1>Quem está assistindo?</h1>
	</header>

	<main>
		<section class="profiles-grid">
			<ul class="profiles" role="list">
				<li style="display: contents; list-style: none;">

					<ol
						style="display: contents; list-style: none; padding: 0; margin: 0;">

						<li class="profile"><a href="catalogo/catalogo.html"
							style="text-decoration: none;">
								<button class="profile-button" data-name="Perfil 1"
									aria-label="Selecionar Perfil 1">
									<figure>
										<img src="assets/perfil-1.png" alt="Perfil 1" class="avatar">
										<figcaption class="caption">João</figcaption>
									</figure>
								</button>
						</a></li>

						<li class="profile"><a href="catalogo/catalogo.html"
							style="text-decoration: none;">
								<button class="profile-button" data-name="Perfil 2"
									aria-label="Selecionar Perfil 2">
									<figure>
										<img src="assets/perfil-2.png" alt="Perfil 2" class="avatar">
										<figcaption class="caption">Becca</figcaption>
									</figure>
								</button>
						</a></li>

						<li class="profile"><a href="catalogo/catalogo.html"
							style="text-decoration: none;">
								<button class="profile-button" data-name="Perfil 3"
									aria-label="Selecionar Perfil 3">
									<figure>
										<img src="assets/perfil-3.png" alt="Perfil 3" class="avatar">
										<figcaption class="caption">Nandi</figcaption>
									</figure>
								</button>
						</a></li>

						<li class="profile"><a href="catalogo/catalogo.html"
							style="text-decoration: none;">
								<button class="profile-button" data-name="Perfil 4"
									aria-label="Selecionar Perfil 4">
									<figure>
										<img src="assets/perfil-4.png" alt="Perfil 4" class="avatar">
										<figcaption class="caption">Zeca</figcaption>
									</figure>
								</button>
						</a></li>

					</ol>
				</li>
			</ul>
		</section>

		<div class="manage-container">
			<button class="manage-button">Editar Perfis</button>
		</div>
	</main>
</body>
</html>
